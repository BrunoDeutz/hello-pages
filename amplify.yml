version: 1
applications:
  - appRoot: client
    frontend:
      phases:
        preBuild:
          commands:
            - npm install
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**
      customRules:
        - source: '/api/<*>'
          target: 'http://hello-pages-env-2.eba-wr2mw2fd.eu-central-1.elasticbeanstalk.com/api/<*>'
          status: '200'
        - source: '/<*>'
          target: '/index.html'
          status: '404-200'
